    #     executable: pip3

    # 4️⃣ Install required Python packages
    # - name: Install Python requirements for Kubespray
    #   pip:
    #     requirements: "/home/pisethkhon888/jenkins-ansible-lesson/k8s-setup/kubespray/requirements.txt"
    #     executable: /usr/bin/pip3 

    - name: Install Python requirements for Kubespray
      pip:
        requirements: "/home/pisethkhon888/jenkins-ansible-lesson/k8s-setup/kubespray/requirements.txt"
        executable: /usr/bin/pip3
      ignore_errors: yes  # <-- this will skip errors for Ansible package

