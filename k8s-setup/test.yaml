- name: Setup Kubespray environment
  hosts: localhost
  become: yes
  vars:
      kubespray_dir: "/home/pisethkhon888/jenkins-ansible-lesson/k8s-setup/kubespray"
      desired_ansible_version: "10.7.0"

  tasks:

    # 0️⃣ Remove old Kubespray if exists
    - name: Remove old Kubespray directory
      file:
        path: "{{ kubespray_dir }}"
        state: absent

    # 1️⃣ Clone Kubespray
    - name: Clone Kubespray
      git:
        repo: https://github.com/kubernetes-sigs/kubespray.git
        dest: "{{ kubespray_dir }}"
        version: master
      ignore_errors: yes
    # - name: Install Kubespray requirements
    #   pip:
