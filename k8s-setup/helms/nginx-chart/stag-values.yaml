
replicaCount: 1
image:
  repository: 69966/earthdx
  pullPolicy: IfNotPresent
  tag: "78"
imagePullSecrets: []
nameOverride: ""
fullnameOverride: "reactjs-earthdx"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""
podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000
securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000


service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations: 
     kubernetes.io/ingress.class: nginx
     #cert-manager.io/clusterssuer: letsencrypt-stagging
     cert-manager.io/cluster-issuer: "letsencrypt-stagging"
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: planting-k8s.sethnexusonline.online
      paths:
        - path: /
          pathType: Prefix
  tls:
   - secretName: planting-k8s-tls
     hosts:
       - planting-k8s.sethnexusonline.online

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi
livenessProbe:
  httpGet:
    path: /
    port: http
# are you ready to serve my request ?
readinessProbe:
  httpGet:
    path: /
    port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}
tolerations: []
affinity: {}