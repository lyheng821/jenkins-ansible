# This playbook is only used to create masters machines and don't have static ip 

# /home/pisethkhon888/ansible-related/laC/playbooks/tasks/create-masters-tasks.yaml
- name: Loop to show machines specs
  debug: 
    msg: |
      Machine Name: {{ item.name }}

  loop: "{{ machines_info }}"
  when: true 

- name: Slurp pub key from local machine
  slurp:
    src: "{{ ssh_pubkey_path }}"
  register: ssh_pubkey
  when: true 

- name: Create GCP instance
  google.cloud.gcp_compute_instance:
    name: "{{ item.name }}"
    machine_type: "{{ item.machine_type }}"
    zone: "{{ item.zone }}"
    project: "{{google_project_id}}"
    auth_kind: "serviceaccount"
    service_account_file: "{{ service_account_path }}"
    state: present # absent -> delete instance 
    metadata:
      ssh-keys: "{{agent_user}}:{{ ssh_pubkey['content'] | b64decode }}"

    disks:
      - auto_delete: true
        boot: true
        initialize_params:
          source_image: "{{ item.image }}"
          disk_size_gb: "{{ item.disk_size }}"
          disk_type: "{{ item.disk_type }}"
    network_interfaces:
      - network:
          selfLink: "projects/{{google_project_id}}/global/networks/default"
        access_configs:
          - name: External NAT
            type: ONE_TO_ONE_NAT
    tags:
      items:
        - http-server
        - https-server
  loop: "{{ machines_info }}"
  register: gcp_instances
  # when: false 
  when: item.name in ["master02","master03"] #note master1 is boss
    # - item.name == "master02"
    # - item.name == "master03" 
# Error in getting the first values  results 
- name: Write gcp_instances into json file
  copy:
    content: "{{ gcp_instances }}"
    dest: "./gcp_more_instances.json"
  when: true
- name: Create inventory from template 
  template: 
    src: ../templates/masters-inventory.j2 
    dest: ../inventory.ini
  when: true  

