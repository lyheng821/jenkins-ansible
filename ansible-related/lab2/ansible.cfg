[defaults]
roles_path=roles
inventory=inventory.ini
ansible_user=pisethkhon888

# to provide the ansible interpreter config 
interpreter_python=/usr/bin/python3

# To avoid prompting YES NO when first SSH 
host_key_checking = False
# config inside ansible.cfg for YES NO when first ssh to machine
[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null


; ansible-playbook playbooks/install-common-services.yaml